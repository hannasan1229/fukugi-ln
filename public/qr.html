<!DOCTYPE html>
<html lang="en">
<head>

  <title>Maho Fukuda – Digital Business Card</title>

  <style>
    body {

      display: flex;

      font-size: 1.6rem;
    }

    p {
      margin: 0.4rem 0;
      line-height: 1.5;
    }

    .button {
      display: inline-block;
      margin-top: 1.6rem;
      padding: 0.9rem 1.5rem;
      background: #4d7c0f;
      color: #ffffff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
    }

    .button:hover {
      background: #3f6212;
    }

    .small {
      margin-top: 1.2rem;
      font-size: 0.9rem;
      color: #555;
